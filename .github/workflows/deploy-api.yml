name: Deploy API

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_URL }}

jobs:
  deploy:
    name: Build, migrate, and deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          echo "sha_tag=${{ secrets.ECR_REPOSITORY_URL }}:staging-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${{ secrets.ECR_REPOSITORY_URL }}:staging-latest" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.sha_tag }}" \
            -t "${{ steps.meta.outputs.latest_tag }}" \
            apps/api
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.latest_tag }}"

      - name: Run database migrations
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster staging-finance \
            --task-definition staging-finance-api \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[subnet-05de87be887cb6767,subnet-0b62319b9b5cd88e9],
              securityGroups=[sg-06c38e4a6a2e3b3e4],
              assignPublicIp=DISABLED
            }" \
            --overrides '{
              "containerOverrides": [{
                "name": "finance-api",
                "command": ["node_modules/.bin/drizzle-kit", "migrate"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"

          echo "Waiting for migration task to complete..."
          aws ecs wait tasks-stopped \
            --cluster staging-finance \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster staging-finance \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Migration task exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Database migration failed with exit code $EXIT_CODE"
            exit 1
          fi

          echo "Migration completed successfully."

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster staging-finance \
            --service staging-finance-api \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster staging-finance \
            --services staging-finance-api
