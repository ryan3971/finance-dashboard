services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: finance_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    command: pnpm --filter api dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finance_dev
    ports:
      - '3001:3001'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
